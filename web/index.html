<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="RoboGenius Tech — Intelligent Robotic Process Automation solutions for enterprise businesses.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="RoboGenius Tech">

  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/Icon-512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="shortcut icon" href="favicon.ico">

  <title>RoboGenius Tech — Intelligent RPA Solutions</title>

  <style>
    body {
      background-color: #050A18;
      margin: 0;
      padding: 0;
    }
    #loading {
      position: fixed;
      inset: 0;
      background: #050A18;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .loader-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #0066FF, #7B2FFF);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 20px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .loader-text {
      color: #8A9CC8;
      font-family: sans-serif;
      font-size: 14px;
      letter-spacing: 2px;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(0,102,255,0.3); }
      50% { transform: scale(1.05); box-shadow: 0 0 40px rgba(0,102,255,0.6); }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loader-icon">🤖</div>
    <div class="loader-text">LOADING ROBOGENIUS...</div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loader = document.getElementById('loading');
      loader.style.opacity = '0';
      loader.style.transition = 'opacity 0.5s ease';
      setTimeout(function() { loader.remove(); }, 600);
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
